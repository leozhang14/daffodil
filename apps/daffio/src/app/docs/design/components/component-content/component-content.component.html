<daffio-doc-viewer [breadcrumbs]="doc().breadcrumbs" [toc]="toc()">
	<h1>{{doc().title}}</h1>
	<p [innerHtml]="doc().longDescription | safe"></p>
	<daff-tabs
		[initiallySelected]="USAGE_TAB_ID"
		[linkMode]="true"
		[url]="doc().id"
		(tabChange)="setTab($event)"
		aria-label="Documentation sections"
	>
		<daff-tab [id]="USAGE_TAB_ID">
			<daff-tab-label>
				Usage
			</daff-tab-label>
			<daff-tab-panel>
				<div
					[innerHtml]="doc().contents | safe">
				</div>
			</daff-tab-panel>
		</daff-tab>

		<daff-tab [id]="API_TAB_ID">
			<daff-tab-label>
				API
			</daff-tab-label>
			<daff-tab-panel>
				@for (kv of doc().api | keyvalue | daffioDocsDesignApiSortSectionLabels; track kv.key) {
					<h2 [attr.id]="kv.key">{{getSectionLabel(kv.key)}}</h2>
					@for (apiDoc of kv.value; track $index) {
						<ng-template [ngComponentOutlet]="getApiComponent(apiDoc)" [ngComponentOutletInputs]="{doc: apiDoc, child: true}"></ng-template>
						<hr>
					}
				}
			</daff-tab-panel>
		</daff-tab>
	</daff-tabs>
</daffio-doc-viewer>

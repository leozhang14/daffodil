<daff-media-gallery>
  @for(image of images; track image) {
    <ng-template daffThumbnail [thumbnailSrc]="image.url" [label]="image.label">
      <daff-image 
        alt="{{ image.label }}"
        src="{{ image.url }}"
        width="594"
        height="737">
      </daff-image>
    </ng-template>
  }
</daff-media-gallery>
